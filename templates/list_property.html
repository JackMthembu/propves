<h2>List Property</h2>

<form method="POST">
    <label for="deposit">Deposit:</label>
    <input type="number" name="deposit" id="deposit" required><br>

    <label for="admin_fee">Admin Fee:</label>
    <input type="number" name="admin_fee" id="admin_fee" required><br>

    <label for="monthly_rental">Monthly Rental:</label>
    <input type="number" name="monthly_rental" id="monthly_rental" required><br>

    <label for="available_start_date">Available Start Date:</label>
    <input type="date" name="available_start_date" id="available_start_date" required><br>

    <label for="available_end_date">Available End Date:</label>
    <input type="date" name="available_end_date" id="available_end_date"><br>

    <button type="submit">List Property</button>
</form>
