<div class="container" style="max-width: 1000px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px #ebe9e900; background-color: #fff;">
    <h2>Residential Lease Agreement</h2>
    <div class="generate_lease">
        <h3>Generate Lease Agreement</h3>
        <form method="POST" id="leaseForm">
            <h3>Lease Terms</h3>
            <p>Please enter the start and end dates of the lease</p>
            <div class="field" style="display: flex; align-items: center;">
                <label for="date_start" style="margin-right: 10px;">Start Date:</label>
                <input type="date" id="date_start" name="date_start" value="{{ enquiry.listing.available_start_date }}" required style="margin-right: 20px;">
                
                <label for="date_end" style="margin-right: 10px;">End Date:</label>
                <input type="date" id="date_end" name="date_end" required>
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const dateStartInput = document.getElementById('date_start');
                    const dateEndInput = document.getElementById('date_end');

                    // Set the default value for date_end to 365 days from date_start
                    if (dateStartInput.value) {
                        const startDate = new Date(dateStartInput.value);
                        const endDate = new Date(startDate);
                        endDate.setDate(startDate.getDate() + 365); // Add 365 days
                        dateEndInput.value = endDate.toISOString().split('T')[0]; // Set the value in YYYY-MM-DD format
                    }

                    // Update date_end when date_start changes
                    dateStartInput.addEventListener('change', function() {
                        const startDate = new Date(this.value);
                        const endDate = new Date(startDate);
                        endDate.setDate(startDate.getDate() + 365);
                        dateEndInput.value = endDate.toISOString().split('T')[0];
                    });
                });
            </script>

            <h3>Financial Details</h3>
            <div class="field">
                <label for="monthly_rental">Monthly Rental:</label>
                <input type="number" id="monthly_rental" name="monthly_rental" value="{{ enquiry.listing.monthly_rental }}" required>
            </div>
            <div class="field">
                <label for="deposit">Deposit:</label>
                <input type="number" id="deposit" name="deposit" value="{{ enquiry.listing.deposit }}" required>
            </div>
            <div class="field">
                <label for="admin_fee">Admin Fee:</label>
                <input type="number" id="admin_fee" name="admin_fee" value="{{ enquiry.listing.admin_fee }}" required>
            </div>

            <h3>Daily Compounding (optional)</h3>
            <div class="field">
                <label for="daily_compounding">Daily Compounding [Optional]:</label>
                <input type="number" id="daily_compounding" name="daily_compounding" value="{{ form.daily_compounding.data }}">
            </div>
            <h3>Additional Terms</h3>
            <div class="field">
                <textarea id="additional_terms" name="additional_terms" style="width: 100%; height: 100px;"></textarea>
            </div>

        </form>
    </div>
</div>
